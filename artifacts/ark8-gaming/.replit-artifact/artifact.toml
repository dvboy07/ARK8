kind = "web"
previewPath = "/"
title = "ARK8 Gaming"
version = "1.0.0"
id = "artifacts/ark8-gaming"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24119

[services.development]
run = "pnpm --filter @workspace/ark8-gaming run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ark8-gaming", "run", "build" ]
publicDir = "artifacts/ark8-gaming/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24119"
BASE_PATH = "/"
